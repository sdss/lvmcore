schema:
  name: epochs
  dtype: dict[int, dict]
  description: Dictionary mapping fiber flat factors to exposure numbers used to generate
    those factors, epochs are divided by 'Instrument intervention' event.
  keyschmas:
  - name: flavors
    dtype: dict[int, int|str]
    description: Dictionary mapping frame flavors, either 'science' or 'twilight'
      to a list of MJDs to source from.
  - name: trigger
    dtype: str | null
    description: Reason for which these factors were measured, see calibration epochs
      `trigger`.
  - name: comment
    dtype: str | null
    description: Optional comment providing more context about the factors measurements.
